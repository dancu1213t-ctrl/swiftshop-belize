<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>SwiftShop BZ City</title>

<link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">
<link rel="icon" type="image/png" sizes="32x32" href="favicon.png">
<link rel="manifest" href="manifest.json">

<style>
html, body{
  margin:0;
  padding:0;
  width:100%;
  height:100%;
  overflow:hidden;
  background:#fff;
}

iframe{
  width:100%;
  height:100%;
  border:none;
  display:block;
}
</style>

</head>

<body>

<iframe
  src="https://script.google.com/macros/s/AKfycby5LbXWRh5T8jeeJO7WnrkJ0WpVbzco-Gy0leJxAGS7weCklN75MWXjDI_RgjakhB0P/exec"
  allow="geolocation; clipboard-read; clipboard-write">
</iframe>

<script>
(function () {

  const ua = navigator.userAgent || navigator.vendor || window.opera;
  const isInApp = /Instagram|FBAN|FBAV/i.test(ua);

  if (!isInApp) return;

  const frame = document.querySelector("iframe");
  if (frame) frame.style.display = "none";

  const overlay = document.createElement("div");

  overlay.style.cssText = `
    position:fixed;
    inset:0;
    background:#fff;
    z-index:9999;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    text-align:center;
    padding:20px;
    font-family:Arial,sans-serif;
  `;

  overlay.innerHTML = `
    <div style="max-width:320px;">
      <h2>⚠️ Open in Browser</h2>

      <p>
        SwiftShop cannot run properly inside Instagram or Facebook.
      </p>

      <p>
        1️⃣ Tap ⋮ (top right)<br>
        2️⃣ Tap "Open in Browser"
      </p>

      <button onclick="tryOpen()"
        style="
          width:100%;
          padding:15px;
          margin-bottom:10px;
          border:none;
          border-radius:10px;
          background:#000;
          color:#fff;
          cursor:pointer;">
        Open in Browser
      </button>

      <button onclick="copyLink()"
        style="
          width:100%;
          padding:15px;
          border:none;
          border-radius:10px;
          background:#eee;
          cursor:pointer;">
        Copy Link
      </button>
    </div>
  `;

  document.body.appendChild(overlay);

})();

function tryOpen() {
  window.open(window.location.href, "_blank");
}

function copyLink() {
  navigator.clipboard.writeText(window.location.href)
    .then(() => alert("Link copied successfully"))
    .catch(() => alert("Unable to copy link"));
}
</script>

</body>
</html>
